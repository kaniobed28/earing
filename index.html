<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

  <!-- SEO -->
  <title>Piano – Interactive Music Keyboard & Ear Trainer</title>
  <meta name="description"
    content="Play a interactive piano keyboard in your browser. Choose between Piano and Choir voices, and train your ear with the built-in ear training mode." />
  <meta name="keywords" content="piano, music keyboard, ear training, chord, notes, web audio, choir" />
  <meta name="author" content="Piano App" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Piano – Interactive Music Keyboard & Ear Trainer" />
  <meta property="og:description"
    content="Play a piano keyboard in your browser with Piano & Choir voices. Train your ear with the built-in game mode." />

  <!-- Theme colour for mobile browser chrome -->
  <meta name="theme-color" content="#07071a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicon – inline piano emoji SVG (no external file needed) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>" />

  <!-- Preconnect for Google Fonts (already used in App.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
